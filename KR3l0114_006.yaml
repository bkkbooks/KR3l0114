body:
  text: 稽神録卷六宋徐鉉撰李攻天祐初舒州有倉官李攻自言少時因病遂見鬼為人言禍福多中淮南大將張皓專廢立之權威震中外攻時宿於鬵山司命真君廟翌日與道士崔綽然數人將入城去廟數里忽止同行於道側自映大𣗳以窺之良久乃行綽然曰復見鬼耶曰向見一人桎梏甚嚴吏卒數十人衛之向廟而去是必為真君考召也雖意氣尚在已不自免矣或問為誰久之乃肯言曰張皓也聞者皆懼共祕之不旬月而聞皓誅李宗造開元寺成大㑹文武僧道於寺中既罷攻復謂綽然曰向坐中有客為二吏伺緝之而去是不久矣言其衣服容貌則團練巡官陳絳也不數月絳暴疾卒道士邵修默崔之弟親見之趙瑜明經趙瑜魯人纍舉不第困危甚矣因遊太山祈死於嶽廟將出門忽有小吏自後至曰判官召隨之而去奄至一㕔事簾中有人云所重者生君何為求死對曰瑜應鄉薦纍舉不第退無歸耕之處埋死貧病無復生意故祈死耳良久聞簾中檢閲簿書既而言曰君命生至薄名與祿仕皆無分今此見告當有以奉濟今以一藥方授君君以此給足衣食然不可置家置家則貧矣瑜拜謝而出至門外空中飄大桐葉至瑜乃書巴豆丸方於其上與人間之方正同瑜遂稱前長水令賣藥於夷門市餌其藥者病無不愈獲利甚多道士李德陽親見其桐葉已十餘年矣尚如新折者袁州老父袁州村中有老父性謹厚為鄉里所推家亦甚冨一日有紫衣少年車僕甚盛詣其家求食老父即延入設食甚豐遍及從者老父侍食於前因思長吏朝使行縣當有頓地此何人哉意色甚疑少年覺之謂曰君疑我我不能復為君𨼆我仰山神也父悚然再拜曰仰山日獻於祭祀奈何求食乎神曰凡人之祀我皆從我求福我有力不能致者若非其人不當受福者我皆不敢享之以君長者故從君求食爾食訖辭讓而去遂不見朱廷禹江南內臣朱廷禹言其所親泛海遇風舟將覆者數矣海師云此海神有所求可即取舟中所載棄之水中物將盡有一黃衣婦人容色絶世乘舟而來四青衣卒刺船皆朱髮豕牙貌甚可畏婦人徑上船問有好髮髢可以見與其人忙怖不復記但云物已盡矣婦人云在船後掛壁篋中如言而得之船屋上有脯臘婦人取以食四卒視其手鳥爪也持髢而去舟乃達口廷禹又言其所親自江西如廣陵擕一十歲兒行至馬當泊舟登岸晚望及還船失其兒遍尋之得於茂林中已如癡矣翌日乃能言云為人召去有所教我乃吹指長嘯有山禽數十百隻應聲而至彩毛怪異人莫能識自爾東下時時吹嘯衆禽必至至白沙不敢復入博訪醫巫治之積久乃愈僧德林浙西僧德林少時遊舒州路左見一夫荷鋤治方丈之地左右數十里不見居人問之對云頃時自舒之桐城至此暴得痁疾不能去因卧草中及稍醒已昏矣四望無人烟惟虎豹吼呌自分必死俄有一人部從如大將至此下馬據胡牀坐久乃召二卒曰善守此人明日送至桐城縣下遂上馬去倐忽不見惟二卒在焉某即強起問之答此茅將軍也常夜出獵虎憂汝被傷故使護汝欲更問之因而復卧及覺已日出不復見二卒即起而行意甚輕健若無疾者至桐城頃之疾愈故以所見之處立祠祀之德林上舒州十年及回則村落皆立茅將軍祠矣司馬正彛司馬正彛者始為小吏行溧水道中去前店尚逺而飢渴甚意頗憂之俄而遇一新草店數間獨一婦人迎客為設飲食甚豐潔正彛謝之婦人云至都有好粉燕支宜以為惠正彛許諾至建業遇其所知往溧水因以粉燕支託遺其婦具告其處既至不復見店有一神女廟因置所遺而去正彛後為溧水令傳云往往有遇者不知其詳劉宣戊寅歲吳帥征越敗於臨安裨將劉宣傷重卧於死人中至夜有官吏數人持簿書至遍閲死者至宣乃扶起視之曰此漢非是引出十餘步置路左而去明日賊退宣乃得歸宣肥白如瓠初伏於地越人割其凥肉宣不敢動後瘡愈肉不復生作事少偏十餘年而卒黃魯徐三誨為撫州録事參軍其下幹力黃魯者郡之俚人年少頗晢有父母在鄊中數月一告歸歸旬日復來一旦歸月餘不去三誨遣吏至其家召之家人云久不歸矣於是散尋之又月餘乃見在深山中黃衣屣履挾彈而遊與他少年數人皆衣服相同捕之不獲魯家冨乃召募伏於草間以伺三數日果擒之而諸少年皆走歸問其故曰山中有石氏者其家如王公納我為壻他無所言留數日復去又於山中求得之如是者三後一日竟去遂不復見尋石之居亦不能得此山乃臨川人採石之所蓋石之神也張鋋張鋋者纍任邑宰以亷直稱後為彭澤令使至縣宅堂後有神祠祠前巨木成林鳥鳶野禽羣巢其上糞穢積於堂中人畏其神故莫敢犯鋋大惡乃使巫祝於神曰所為土地之神當潔清縣署以奉居人奈何使腥穢如是耶爾二日中當盡逐衆禽不然吾將焚廟而伐𣗳矣居二日有數大梟奮擊而至盡壞羣巢又一日大雨糞穢皆净自此宅居清潔矣潯陽縣吏庚寅歲江西節度使徐知諫以錢百萬修廬山使者廟潯陽令遣一吏典其事此吏嘗入城召一畫工俱往畫工負荷丹彩雜物從之始出城吏昏然若醉自解衣帶投地畫工以吏為醉而隨之須臾復脫衣去帽比至山中殆至裸身近廟澗水中有一卒青衣白韋蔽膝吏至乃執之畫工救之曰此醉人也卒怒曰交交加加誰能得㑹竟擒之坐於水中工知其非人也走往廟中告人競往視之卒已不見其吏猶坐水中已死矣乃閲其出納之籍則已乾沒過半進士謝嶽見之朱元吉烏江縣令朱元吉言其所知泛舟至采石遇風同行者數舟皆沒某既溺不復見水道路如人間其人驅之東行可在東岸山下有大府署門外堆壞船版木如丘陵復有諸人運溺者財物入庫中甚多入門堂上有官人遍召溺者閲籍審之至某獨曰此人不合來可令送出吏即引去復至舟所舟中財物亦皆還之恍然不自知出水已在西岸沙上矣舉船儼然亦無霑溼酤酒王氏建康江寧縣廨之後有酤酒王氏以平直稱癸卯歲二月既望夜店人將閉外戶忽有朱衣數人僕甚盛奄至户將叱曰開門吾將暫憩於此店人奔告其主其主將出迎則已入坐矣主人因設酒食甚備又犒諸從者客甚謝焉頃之有僕夫執細繩百千丈又一人執橛􅍻數百枚前請布圍紫衣可之即出以􅍻釘地繫繩其上圍方曲人家使遍良久曰事訖紫衣起至户外從者白此店亦在圍中矣紫衣相謂曰主人相待甚厚空此一店可乎皆曰一家耳何為不可即命移􅍻出店於圍外顧主人曰以此相報遂去倐忽不見顧視繩􅍻已亡矣俄而巡使歐陽進邏夜至店前使問何故深夜開門又不滅燈燭何也主人具告所見進不信執之下獄將以妖言罪之居二日江寧大火朱雀橋西至鳯臺山居人焚之殆盡此店四鄰皆為煨燼而王氏獨免鮑回鮑回者嘗深山捕獵見一少年裸卧大𣗳下毛髮委地回欲射之少年曰我山神也避君不及勿殺我富貴可致回以刃刺其口血皆逆流遂殺之無何回卒梨山廟建州梨山廟土人云故相李回之廟回貶為建州刺史後卒於臨川卒之夕建安人咸夢回乘白馬入梨山及凶問至因立祠焉世傳靈應王延政在建安興福州缺隙使其將吳某帥兵向晉安吳新鑄一劍甚利將行擕劍禱於梨山廟且曰某願以此劍手殺千人其夕夢神謂已曰人不當發惡願祐汝使汝不死於人之手既戰敗績左右皆潰散追兵將及某自度不免即以此劍自刎而死吳延瑫廣陵有倉官吳延瑫者其弟既冠將為求婦鄰有媒嫗素受吳氏之命一日有人詣門云張司空家使召隨之而去在正勝寺之東南宅甚雄壯嫗云初不聞有張公在是其人云公沒於臨安之戰故少人知者久之其家陳設炳煥如王公家見一老姥云是縣君及坐頃之其女亦出姥謂嫗曰聞君為吳家求婚吾欲以此女事之嫗曰吳氏小吏貧家豈當與貴人為婚耶女因自言曰兒以母老無兄弟家業既大事托善人聞吳氏子孝謹可事豈求髙門耶嫗曰諾將聞之歸以告延瑫異之未敢言數日忽有車輿數乘詣鄰嫗之室乃張氏女與二老婢俱至使召延瑫之妻即席具酒食甚豐皆張氏所偹也其女自議婚事瑫妻內思之此女雖端麗然可年三十餘其小即年却少未必歡也其女即言曰夫妻皆係前定義合豈當嫌老少耶瑫妻聳然不敢復言女即出紅白羅二匹曰以此為禮其他贈遺甚多至暮邀鄰嫗俱歸其家留數宿謂嫗曰吾家至富人不知爾他日皆吳郎所有也室中三大㕑其厨髙至屋因開示之一厨實以銀又指地曰此中皆錢也即命掘之深尺餘即見錢充積又至外㕔庭中繫朱鬛白馬旁有一豕曰此皆禮物也㕔之西復有廣厦百工製作畢偹曰此亦送禮物也至夜就寢聞豕有被驚聲呼諸婢曰此豕不宜在外是必為蛇所嚙也嫗曰蛇豈食猪者耶女曰此中常有之即相與秉燭視之果見大赤蛇自地出縈繞其豕復入地去救之得兔明日方與嫗坐忽召二青衣夾侍左右謂嫗曰吾有故近出少選當還即與青衣凌虛而去嫗大驚其母曰吾女暫之天上㑹計且坐無苦也少頃乃見自外而入微有酒氣曰諸仙留飲吾以媒嫗在此固辭得還嫗回益駭異而不敢言又月餘復召嫗云縣君疾亟及往其母已卒同嫗至葬所葬於陽子縣北徐氏村中盡室往㑹徐氏有女可十餘歲張氏撫之曰此女相當為淮北一武將之妻善視之既葬復厚贈嫗舉家南去莫知所之婚事亦竟不成嫗歸訪其故居但里舍數間問其里中云住此已久相傳云張司空之居竟不得其處後十年廣陵亂妖吳氏之弟歸於建業亦竟無恙貝禧義興人貝禧為邑之鄉胥乾寧甲寅歲十月宿於茭瀆别業夜分忽聞扣門者人馬之聲甚衆出視之見一人緑衣秉簡西面而立從者百餘禧攝衣出迎自通曰某姓周殷名即延入坐問以來意曰余身為地府南曹判官奉王命君為北曹判官爾禧初甚驚殷徐謂曰此乃隂府要職何易及君何辭也俄有從者持牀褥食案帷幕陳設畢置酒食對飲良久一吏趨入白判官至復有一緑衣秉簡二從者捧箱隨之箱中亦緑衣殷揖禧曰命賜君兼同奉召即以祿裳為禧衣之就坐共飲將至五更曰王命不可留矣即與偕行禧曰此去家不逺暫歸告别可乎皆曰君今已死縱復歸安得與家人相接耶乃出門與周殷各乘一馬其疾如風行水上至暮宿一村居店中具酒食而無居人雖設燈燭如隔帷幔云已行二十餘里矣向曉復行久之至一城門衛嚴峻周殷先入復出召禧凡經三門左右吏卒皆趨拜復入一門正北大殿垂簾禧趨走參謁一同人間既出周殷謂禧曰此曹闕官多年第宅曹署皆須整緝君可止吾家也即自殿門東行可一里有大宅止禧於東㕔頃之有同官可三十餘人皆來造請慶賀遂置宴宴罷醉卧至晚遍詣諸官曹報謝復有朱衣吏以王命致泉帛車馬廩餼甚豐備翌日周謂禧曰可視事矣又相與向王殿之東北有大宅陳設甚嚴止禧於中有典吏可八十餘人參請給使㕔之南空屋殿十間即曹局簿書充積其內㕔之北别室兩間有几案及有書厨皆寶玉飾之周以金鑰授禧曰此厨簿書最為祕書管鑰恆當自掌勿輕委人也周既去禧開視之書册積疊皆方尺餘首取一册金題其上作陕州字其中字甚細密諦視之乃可見皆世人之名簿也禧欲知其家事復開一厨乃得常州簿閲其家籍見身及家人世代名字甚悉其已死者以墨鈎之至晚周殷判官復至曰王以君世夀未盡遣暫還夀盡當復居此職禧即以金鑰還授於周禧始閲簿時盡記其家人及已禍福夀夭之事將歸昏然盡忘矣頃之官吏俱至告别周殷二人送之歸翌日夜乃至茭瀆村中入室見已卧於牀上周殷與禧各視寢俄而驚寤日正午時問其左右云死殆半日而地府已四日矣禧即愈一如常人亦無小異又四十餘年乃卒支戬江左有支戩者餘干人世為小吏至戩獨好學為文竊自稱秀才㑹正月望夜時俗取飯箕衣之衣服插箸為觜使畫盤粉以卜戩家為之其時戲祝曰請卜支秀才他日至何官箕乃畫年五十餘他人籍不記惟記其友人鄭元樞貧賤無官亡年四十八元樞後居浙西亷使徐知諫賓禮之將薦於執政行有日矣暴疾而卒實年四十八戩後為金陵觀察判官撿校司空但以此事話於親友竟卒於任年五十一食黃精婢臨川有士人唐遇虐其所使婢婢不堪其毒乃逃入山中久之糧盡飢甚坐水邊見野草枝葉可愛即拔取濯水中連根食之甚美自是恆食久之遂不飢而更輕健夜息大𣗳下聞草中獸走以為虎而懼因得念上𣗳杪乃生也正爾念之而身已在𣗳杪矣及曉又念當下平地又歘然而下自是意有所之身輒飄然而去或自一峰之一峰頂若飛鳥焉數歲其家人伐薪見之以告其主使捕之不得一日遇其在絶壁下即以網三面圍之俄而騰上山頂其主亦駭異必欲致之或曰此婢也安有仙骨不過得靈草餌之爾試以盛饌多其味令甚香美致其往來之路觀其食否果如其言常來就食食訖不復能逺去遂為所擒且述其故問其所食草之形狀即黃精也復使尋之遂不能得其婢數年亦卒豫章人豫章人好食菌有黃如菌者尤為美味有民家治食烹此菌以食工人工人有登厨屋施瓦者下視無人惟釡中煮物以盆覆之俄有一小鬼倮身繞釡而走倐忽投於釡中頃之主人設菌工人獨不食亦不言其故既暮其食菌者皆卒稽神録卷六
