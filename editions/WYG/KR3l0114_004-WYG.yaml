body:
  text: 稽神録卷四宋徐鉉撰陶俊江南吉州刺史張曜卿有傔力曰陶俊性謹直嘗從軍征江西為飛石所中因有腰足之疾恒扶杖而行張命守丹於廣陵之江口因至白沙市中避雨於酒市同立者甚衆有二書生過於前獨顧俊相與言曰厥人好心宜為療其疾即呼俊與藥二丸曰服此即愈乃去後歸舟吞之良乆覺腹中痛楚甚頃之痛止疾亦都瘥操篙理纜尤覺輕捷白沙去城八十里一日復還不以為勞後訪二書生竟不復見延陵村人妻延陵靈寳觀道人謝及損近縣村人有喪婦者請及損為齋婦死已半月矣忽聞椎棺而呼衆皆驚走其夫開棺視之乃起坐頃之能言云為舅姑所召去云我此無人使之執㸑其居處甚閒潔但苦無人一日見溝中水甚清因取以釀饋姑見之大恚曰我不知爾不潔如是用爾何為乃逐之使囘走出門遂甦今尚無恙趙某妻丁亥歳浙西有典客吏趙某妻死未及旬將葬忽大呌而活云為一吏所錯至鶴林門内有府署侍衛嚴整官吏諮及領囚集者甚衆吏持㡬人至庭下堂上一緑衣一白衣偶坐緑衣謂吏曰汝誤非此人也急遣之白衣曰已􅇷至此何用遣之緑衣不從相質食頃緑衣怒叱吏遣之吏持己疾趨出路經一橋數日方修橋其板有釘吏持之走過釘傷足因痛失聲遂活視足果傷俄而隣婦遂卒不復甦矣建業婦人近歳建業有婦人背生一瘤大如數斗嚢中有物如繭栗甚衆行即有聲恒乞於市自言村婦也常常與姊姒軰分養􅁞已獨頻年損耗竊以其姒嚢繭焚之頃之背患此瘡漸成此瘤以衣覆之即氣閉悶常露之乃可如負嚢矣廣陵男子廣陵有男子行乞於市每見馬矢即取食自云常為人飼馬慵不能夜起其主恒自檢視見槽中無草督責之乃取烏梅餅以飼馬馬齒酸楚不能食竟致死亡後因患病見馬矢輒流涎欲食食之與烏梅味正同了無穢氣施汴廬州營田吏施汴嘗恃勢奪民田數十頃其主退為其耕夫不能自理數年汴卒其田主家生一牛腹下有白毛方數寸既長稍斑駮不逾年成施汴字㸃畫無缺道士邵修黙親見之朱慶源婺源尉朱慶源罷任方還家在豫章之豐城庭中地甚爽塏忽生蓮一枝其家駭懼多方以禳之蓮生不已乃築堤堰水以沼之遂成大池芡荷甚茂其年慶源授南豐令後三歳入為大理寺評事僧十朋劉建封㓂豫章僧十朋與其徒奔分寧宿澄心僧院初夜見􅆤外有光視之見團火髙廣數尺中有金車子與火俱行嘔軋有聲十朋始懼其主人云見之數年矣每夜必出於西堂西北隅池中遶堂數周復沒於此以其不為禍福故無掘視之者宜春人天祐初有人游宜春之空宅中兵革之後井邑蕪沒堂西屋梁上有小􅆤外隙􅂽數十畆日暮􅆤外有一物正方自下而上頃之全蔽其􅆤其人引􅃓射之應弦而落時已夕不能仰視明旦㝷之西百餘歩有方杉木板帶一矢即昨所射也朱從本李遇為宣武節度使軍政委大將朱從本其家廏中畜猴圉人夜起秣馬見一物如驢黒而毛手足皆如人據地而食此猴見人乃棄猴已食其半明年遇族誅宣城故老云軍中常有此怪每軍城有變此物即出出則滿城皆臭田頵將敗出於街中巡夜者見之不敢逼旬月禍及周本信州刺史周本入覲揚都舎於邸第遇私諱日獨宿外齋張燈而寐未熟聞室中有聲劃然視之見火爐冉冉而上直抵於屋良乆乃下飛灰勃然明日滿室浮埃覆物亦無他怪薛老峰福州城中有烏石山山有大峰鑿三字曰薛老峰癸夘歳一夕間大風雨山上如數千人喧噪之聲及旦則薛老峰倒立峰字返向上城中石碑皆自轉側其年閩亡王慎辭江南通事舎人王慎辭有别墅在廣陵城西慎辭嘗與親友宴㳺於其上一日忽自愛其岡阜之勢歎曰我死必𦵏於此是夜村中聞犬吠或起視之見慎辭獨騎徘徊於此逼而視之遂不見自是夜夜恒至月餘慎辭卒竟葬其地姚氏東州静海軍姚氏率其徒捕海魚以充歳貢時已將晚而得魚殊少方憂之忽獲網中一人黒色舉身長毛拱手而立問之不應海師曰此所謂海人見必有災請殺之以塞其咎姚曰此神物也殺之不祥乃釋而祝之曰爾能為我致羣魚以免闕職之罪信為神矣毛人却行水上數十歩而沒明日魚乃大獲倍於常歳矣彭顒宣州鹽鐡院官彭顒常病數月恍惚不樂每出外㕔輒見俳優樂工數十人長皆數寸金奏百戱並作朱紫炫目顒視之移時欣笑或憤懣然無如之何他人不見也顒後病愈亦不復見後十餘年乃卒吕師造吕師造為池州刺史頗聚歛常嫁女於揚都資送甚厚使家人送之晚泊竹篠江岸上忽有一道士狀若狂人來去奔走忽躍入舟中穿舟中過隨其所經火即大發復登後船火亦隨之凡所過之舟皆為煨燼一老婢髪尺餘人與船了無所損失道士亦不復見崔彦章饒州刺史崔彦章送客於城東方讌忽有一小車其色如金髙尺餘巡席而行若有求覓至彦章因即絶倒擕與歸州而卒潤州氣戊子歳潤州有氣如虹五彩奪目有首如驢長數十丈環㕔事而立行三周而滅占者曰㕔中將有哭聲然非州府之咎也頃之其國大后殂發喪於此堂黄極甲午歳江西館驛巡官黄極子婦生男子一首兩身相背四手四足建昌民家生牛每一足更附出一足投之江中翌日浮於水上南昌新義里地陷長數十歩廣者數丈狹者七八尺其年節度使徐知詢卒熊勛軍吏熊勛家於建康長樂坡之東嘗日晚見屋上有二物大如卵赤而有光徃來相馳逐家人駭懼有親客壯勇開屋捕之得一乃被繒綵包一雞卵殻也剉而焚之臭聞數里其一走去不復來矣家亦無恙王建封江南軍使王建封驕恣奢僣築大第於淮之南暇日臨街坐􅆤下見一老嫗擕少女過於前衣服􅀈縷而姿色絶世建封呼問之云孤貧無依乞食至此建封曰吾納爾女而給養以終身可乎嫗欣然建封即召入命取新衣二襲以衣之嫗及女始脱故衣皆化為血凝於地旬月建封被誅廣陵士人廣陵有士人嘗張燈獨寢一夕中夜而坐忽有雙髻青衣女子姿質甚麗熟寐於其足某知其妖物也懼不敢近復寢如故向曉乃失門户猶扃鐍後自是夜夜恒至有術士為書符施其髻中夜半寢以閲之果見自門而入徑詣髻中解取符燈下視之微笑訖復為置髻中升牀而寢無懼後聞玉笥山有道士符禁神妙乃往訪之至暮登舟遂長往途次豫章暑夜乘月行舟時甚熱盡開船􅆤而寢中夜忽復見寐於牀後某即潜起急提其手足投之江中完然有聲因爾遂絶黄仁濬舒州司士參軍黄仁濬自言五十歳罷隴州汧陽主簿至鳯翔有文殊寺寺中有土偶數十軀忽自然揺動如醉人狀食頃不止傍觀者如堵官司禁止之至今未得其應驗孫徳遵舒州都虞侯孫徳遵其家寢室中鐵燈擎忽自揺動如人撼之至明日有婢偶至燈擎所忽爾仆地遂卒朱盛文梁開平二年使其將李思安攻潞州營於壺口伐木為柵破一大木木中𨽻書六字曰天十四載石進思安表上之其羣臣皆賀以為十四年必有逺夷入貢司天少監徐鴻獨謂其所親曰自古無一字為年號者上天符命豈關數乎吾以為丙申之年當有石氏王此地者移四字中兩豎書置天字左右即丙字也移四之外圍以十字貫之即申字也後至丙申歳晉髙祖以石信起并州如鴻之言栁翁天祐中饒州有栁翁嘗乘小舟釣鄱陽江中不知其居處妻子亦不見其飲食凡水族之𩔖與山川之深逺者無不周知之凡鄱人漁釣者咸諮訪而後行吕師造為刺史修城掘濠至城北則雨止役則晴或問栁翁翁曰此下龍穴也震動其土則龍不安而出穴龍出則雨矣掘之不已必得其穴則霖雨方將為患矣既深數丈果得大木長數丈交加構疊之累之數十重其下霧氣衝人不可入而其木上皆腥涎縈之刻削平正非人力所致自是果霖雨為患吕氏諸子將網魚於鄱陽江召問栁翁翁指南岸一處今日惟此處有魚然有一小龍在焉諸子不信網之果大獲舟中以瓦盆貯之中有一鱓魚長一二尺雙目精明有二長鬚繞盆而行羣魚皆翼從之將至北岸遂失所在栁翁竟不知所終李禪李禪楚州刺史承嗣少子也居廣陵宣平里大第晝日寢庭前忽有白蝙蝠繞庭而飛家僮軰競以帚撲皆不能中乆之飛出院門撲之亦不中及飛出至外門之外遂不見其年禪妻卒輀車出入之路即白蝙蝠飛翔之所也蚓瘡天祐中浙西重建慈和寺畫地既畢每為蚯蚓穿穴執事者患之有一僧數以石灰覆之由是得定而殺蚯蚓無數頃之其僧病舉身皆痒曰須得長指爪者搔之以至成瘡瘡中輒得死蚯蚓一條殆數百千條肉盡至骨而死蜂餘廬陵有人應舉行遇夜詣一村舎求宿有老翁出見客曰吾舎窄人多容一榻可矣因止其家屋室百餘間但窄小甚乆之告饑翁曰吾家貧所食惟野菜耳即以設客食之甚甘美與常菜殊及就寢惟聞訌訌之聲既曉而寤身卧田中旁有大蜂窠客嘗患風因而遂愈葢食蜂之餘爾熊迺信州有板山川谷深逺采板之所因以名之州人熊迺嘗與其徒入山伐木其弟從西追之日暮不及其兄忽見中有道士自東來傳呼甚厲迺弟恐懼伏於草間俄而旗幟戈甲絡繹而至道旁亦有行人其犯清道者輒為所戮至軍中有一人若大將者西馳至度其尚逺乃敢起行迨曉方見其兄且道所見衆皆曰非巡邏之所而四去溪灘險絶徃無所詣安得有此人即共㝷之可十餘里隔溪猶見旌旗紛若布圍畋獵之狀其徒有勇者遥叱之忽無所見就視之人皆𣗳葉馬皆大蟻取而碎之皆有血云貯在庭中以火燒之少時蕩盡衆口所哭迺亦㝷患足腫麄於瓮其酸不可忍旬月而終劉威丁夘歳盧州刺史劉威移鎮江西既去任而郡中大火虞候申巡火甚急而徃徃有持火夜行捕之不獲或射之殪就視之乃棺材板腐木敗帚之𩔖郡人愈恐數月除張宗為盧州刺史火災乃止馬希範楚王馬希範修長沙城開濠畢忽見一物長十丈餘無頭尾首足狀若土山自北岸出㳺泳水上乆之入南岸而沒出入俱無蹤跡或謂之土龍無㡬何而馬氏遂亡稽神録卷四
