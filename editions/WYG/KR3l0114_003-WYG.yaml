body:
  text: 稽神録卷三宋徐鉉撰徐彦成軍吏徐彦成恒主市木丁亥嵗徃信州汭口場無木可市泊舟久之一日晩有少年從二僕徃来岸側狀若訪人而不遇者彦成因延入舟中為設酒席賓禮之少年甚媿焉將去謝曰吾家近此數里别業中君今肯枉顧乎彦成許諾眀日乃徃行里餘有僕馬来迎奄至一大宅門舘甚盛少年出延客酒膳豐備從容久之彦成因言住此久無木可市少年云吾有木在山中眀當令出也居一二日果有杉木大至良而價亷市易既畢徃辭少年復出大杉板四枚曰向之木吾所賣今以此贈君至吳當獲善價彦成回始至秦淮會吳帥殂納杉板為棺以求材之尤異者獲錢數十萬彦成廣市珍玩復徃汭口以酬少年更與交易於市三徃返獲其厚利間一嵗復徃但見村落如故了無所見詢其里中竟無能知之者周潔霍丘令周潔甲辰嵗罷任客逰淮上時民大飢逆旅殆絶投宿無所升髙而望遙見村落烟火趨而詣之得一村舎扣門久之一女子出應門告以求宿女子曰家中飢餓老幼皆病愧無以延客止中堂一榻可矣遂入之女子侍立於前少頃其妹復出映婦而立不見其面潔自具食耴餅二枚以與二女持之入室閉門而聽悄然無聲潔方悚然而懼向曉將去使呼二女告别了無聲應者因壊户而入乃見積屍滿屋皆將枯朽惟女子死未旬日其妹靣色已枯矣二餅猶置胸上潔後皆為瘞之云楊副使壬午嵗廣陵𤓰州市中有人市果實甚亟咸問所用云吾長官眀日上事又問長官為誰云楊副使也又問官署何在又云金山之東遂去不可復問時浙西有楊副使被召之揚都船至金山無故而沒僧珉楚廣陵法雲寺僧珉楚嘗與中山賈人章某者親􅍄章死珉楚為設齋誦經數月忽遇章於市中楚未食章即延入食店為置胡餅既食楚問君已死那得在此章曰然吾以小罪未得辭脫今死為揚州掠剩兒復問何謂掠剩曰凡市人賣販利息皆有常數過數得之為掠剩吾得而掠有之今人世如吾軰甚多因指路人男女曰某人某人皆是也頃之有一僧過於前又曰此僧亦是也因召至與語良久僧亦不見楚也頃之相與南行遇一婦人賣花章曰此婦人之花亦鬼所買花亦鬼用之人間無所用也章即出數錢買之以贈楚曰凡見花而笑者皆鬼也即告辭而去其花紅色可愛而甚重楚亦昏然而歸路人見花頗有笑者至是北門忽自念我與鬼同逰復持鬼物不可即將花擲淺水中既歸有同院人覺其靣色甚異以為中惡競持湯藥以救之良久乃復且言其故因相與覆視其花乃一死人手也楚亦無恙陳守規軍將陳守規者嘗坐法流信州寓止公館館素凶守規始至即鬼物晝見竒形恠狀變化倐忽守規素剛猛親持􅃓矢刀仗與之鬪久之乃空中語曰吾鬼神不欲與人雜處君既堅貞願以兄事可乎守規許之自是嘗與交言有吉凶輒先報或求飲食與之輒得錢物既久頗為厭倦因求方士手書章疏奏之上帝翌日鬼大罵曰吾與君為兄弟奈何上章疏我大丈夫結交當如是耶守規曰安得此事即於空中擲下章疏紙墨宛然鬼又曰君圖我居謂我無所止也吾今徃蜀川亦不下於此矣由是遂絶廣陵賈人廣陵有賈人以栢木造牀凡什物百餘事製作甚精其費已二十萬載之建康賣以求利晩至𤓰歩㣲有風起因泊山下頃之有巨舟其中空惟篙師三人乘之亦泊於其側賈人疑之相與議此必羣盜也將伺夜而刧我前浦既逺風又益急逃避無地夜即相與登岸深避之俄而風雨雷電䝉覆舟所岸上則星月皎然食頃雨止雲散見巨艘稍稍前去乃敢歸舟中所載栢牀什物都不復見餘物皆在巨舟猶在東岸有人呼曰爾無恨當還爾價直賈人既失所載復歸廣陵至家已有人送錢三十萬置之而去問其故即泊𤓰步之明日也浦城人浦城人少死於路家有金一斤其妻匿之不聞於其姑逾年忽夜扣門號哭而歸其母驚駭相與哀慟曰汝真死耶曰兒實已死有不平事是以暫歸因坐母膝言語如生但手足冷如氷耳因起握刀責其妻曰我死有金爾何以不供母乃自藏􅁘即徃殺之其母曰汝已死矣倘殺爾妻必謂我所殺也於是哭辭母而去復自提刀送其妻歸母家迨曉行數十歩忽然不見劉道士廬山道士劉某將逰南嶽路出宜春宿一村家其主至貧復喪一子未有以殮旣夕忽有一男子行哭而來但撫膺而號曰可惜可惜劉出視之見面白如雪梳兩髽髻者徑入其家負尸而去莫知所之清源都將清源人楊某為本部防遏營副將有空地在西郭侵晨趨府未歸家人方食忽有一鵞負紙錢自門而入徑詣西郭房中家人云此鵞自神祠中來耶令其奴逐之奴入房但見一雙髻白髯老翁家人莫不驚去某歸聞之怒持杖擊之鬼出没四隅變化倐忽杖莫能中某益怒曰食訖當復來擊殺之鬼乃折腰而前曰諾楊有女二長女入厨切肉具食肉落碪輒失去女執刀白父忽碪下露一大黑毛手曰請斫女走氣殆絶因而成疾次女於大甕中取鹽有一猴突出上女之背女走至堂前復失之亦成疾乃召巫立壇治之鬼亦立壇作法愈盛餘巫皆不能制亦懼而去頃之二女及妻皆卒後有善魔法者名曰明教請為持經一宿鬼乃唾罵某而去因而遂絶某其年亦卒王誗妻王誗者南安縣大盆村人也妻林氏忽病有鬼慿之言我陳九娘也以香花祠我當有益於主人誗許之乃呼林為阿姐為人言禍福多中半歳餘乃見形自腰已下見為人未嘗來者亦不見也但以言語相接鄉人有召者不擇逺近與林偕往人有祭祀但具酒食陳氏自召神名祝詞明惠聽者忘倦林拱坐而已二年間獲利甚溥一旦忽悲泣謂林曰我累生為人女年未及笄而夭問於地府乃前生隱瞞阿姐錢一十萬故主者令我為神以償此錢訖即生為男子而獲夀今酬已足請置酒别乃盡見形容質端媚言詞婉轉殷勤致謝嗚咽云珍重珍重遂不復見林昌業林昌業者漳浦人也博覽典籍精究術數性髙雅人不可干嘗為泉州軍事衙推年七十餘退居本郡龍溪縣羊額山之陽鄉里宗敬之有良田數頃嘗欲舂榖為米載詣州貨之工力未集忽有一男子年可三十髭髯甚長來詣林林問何人但微笑唯唯不對林知其鬼物令家人食之致飽而去翌日忽聞倉下有礱榖聲視之乃昨日男子取榖礱之林問無故辛苦而鬼亦笑不言復置豐饌飯蔬而已凡月餘礱榖不輟鬼復自斗量得米五十餘石拜辭而去卒無一言不復再來矣潘襲潘襲為建安令遣一手力齎牒下鄉有所追攝手力新受事未嘗行此路至夕道左有草舍扣門求宿其家惟一婦人應門云主人不在又將移居無暇延客也手力以道逺多虎苦求之婦人即召入門側席地而寢婦人結束箱篋什器之𩔖達旦不寐手力向曉辭去行數里乃覺失所齎牒復返求之宿處乃一墳方見其家人改葬及開棺席下得一書即所失公牒也胡澄池陽人胡澄傭耕以自給妻卒官給棺以葬其平生服飾悉附棺中後數年澄偶至市見列肆賣首飾者熟視之乃妻送葬物也問其人云一婦人寄於此約某日來取澄如期復往果見其妻取直而去澄因躡其後至郊外及之妻曰我昔葬時官給棺具雖免暴骨然至今為所司督責其直計無所出賣此以償之耳言訖不見澄遂為僧焉王攀髙郵縣醫士王攀鄉里推以長者恒往來廣陵城東每數月輒一直縣自念明日當赴縣今夕即欲出東水門夜泛小舟及明可至旣而乃與親友飲於酒家不覺大醉誤出參佐門投一村舍宿向曉稍醒東壁有燈而不甚明仰視屋室知非常宿處因獨嘆曰吾明日須至縣今在何處也久之乃聞其内躡履聲有婦人隔别問曰客將何之因起辭謝曰欲之髙郵醉中偶至於是婦曰此非髙郵道也吾使人奉送至城東無憂也乃有一村豎至隨之而行每歴艱險豎輒以手捧其足而過既曙至城東常宿之店告辭而去攀解其襦以贈之豎不受固與之乃持去既而入店易衣又見其襦放在腰下即復詣宿處尋之但一古塜並無人家鄭守澄廣陵禆將鄭守澄新買一小婢旬日有夜扣門者曰君家納婢其名籍在此婢忽病遂卒既而守澄亦病卒而弔客數人轉相染著皆卒甲寅歳春也劉隲洪州髙安人劉隲少遇亂有姊曰糞掃為軍將孫金所虜有妹曰烏頭生十七年而卒卒後三歳孫金為常州團練副使糞掃從其女君㑹葬於大將陳氏乃見烏頭在焉問其所從來云頃為人所虜至岳州與劉翁媪為女嫁得北來軍士任某任即陳所將卒也從陳至此耳因通信至其家隲時為縣手力後數年因事至都遂往毗陵省之晩止逆旅翌日先謁孫金即詣任營中先遣小僕覘之方見洒掃庭内曰吾阿兄將至矣僕良久扣門問為誰曰髙安劉家使來乃曰非兄名隲多髯者乎昨日晚當至何為遲也即出營門迎之容貌如故相見甚悲泣了無小異頃之孫金遣其諸甥持酒食至任之居撫叙良久烏頭曰今日乃得二兄來證我為人向來恒為諸兄輩呼我為鬼也任亦言其舉止輕健女工敏速恒夜作至旦若有人為同作者飲食必待冷而後食隲因密問汝昔已死那得至是對曰兄無為如此問我將不得相見矣隲乃不敢言久之任卒再適軍士羅氏時江州陳承昭為髙安制置使召隲問其事令發墓視之墓在米嶺無人省視數十年矣伐木開路而至見墓上有穴大如碗測其甚深衆懼不敢發相與退坐大樹下筆疏其事以白承昭是歳烏頭病隲往省之乃曰頃為鄉人百十餘輩持刀仗劒㡬中我面故我大責罵力拒之乃退坐大樹下作文書而去今至舉身猶痛隲乃知恒出入墓中也因是亦懼而疏之羅後移𨽻晉王城戍顯德五年周有淮南之地羅陷没不知所在時年六十二歳矣舒州軍吏王琪為舒州刺史有軍吏方某者其家忽有鬼降自言姓杜年二十廣陵富家子居通津橋之西前生因欠君錢十萬今地府使我為人償君此債爾因為人占候禍福其言多中方以家貧告琪為一鎮將因問鬼吾所求可得否鬼曰諾吾將問之良久乃至曰必得之其鎮名一字正方他不能識矣既而得雙港鎮將以為其言無驗未及之任琪忽謂方曰適得軍牒軍中令一人來為雙港鎮將吾今以爾為睆口鎮竟如其言比歳餘鬼忽言曰吾還君債足告别而去遂寂然方後至廣陵訪得杜氏問其子弟云吾第二子頃忽病如癡人歳餘今愈矣田頵宣州節度田頵將作亂一日向暮有鳥出色如雉而大尾有火光如散星之狀自外飛入止㦸門而不見翌日府中大火曹局皆盡惟甲兵存焉頵資以起事鍾傳尚平王鍾傳在江西有衙門吏孔知讓新治第晝有一星隕於庭中知讓方甚惡之求典外戎以空其第歳餘御史中丞薛昭緯貶官至豫章傳取此第以居之後遂卒於是頓金袁州刺史頓金罷郡還都有人以紫襆包一物詣門遺之開視則白襕衫也遽追其人則亡矣其年金卒宋氏江西軍吏宋氏嘗市木至星子江見水濵人物諠聚乃漁人得大黿黿見宋屢顧宋即以錢一千贖之放於江中後數年泊舟龍沙忽有一僕夫至云某長史奉召宋怳然不知何長史也旣往歘至一府官出迎與坐曰君尚相識邪宋思之實未嘗識又曰君亦記星子江中放黿邪曰然我即黿也頃嘗有罪帝命謫為水族見困於漁人微君之惠已骨朽矣今已得為九江長予將有以奉報君之兒某者命當溺死名籍在是後數日烏山神將朝廬山使者行必以疾風雨君兒當以此時死今有一人名姓正同亦當溺死但先期歳月間耳吾取以代之君兒宜速登岸避匿不然不免宋陳謝而出不覺已在舟次矣數日果有風濤之害死者甚衆宋氏之子竟免史氏女溧水五壇村人史氏女因蒔花困倦偃息樹下見一物鱗角爪距可畏來據其上已而有娠生一鯉魚養於盆中數日益長乃置投瀨中頃之有人刈草誤斷其尾魚即奮躍而去風雨隨之入太湖而止家亦漸富其後女卒每寒食其魚輒從羣一至墓前至今每閏年一至爾有漁人李黑獺恒張網於江忽獲一嬰兒長可三尺為網亂綖所縈浹旬不解有道士見之曰可取鐵汁灌之如其言遂解視嬰兒口鼻眉髮如畫而無肩口猶有酒氣衆懼復投於江而去矣漁人近有漁人泊舟馬當山下月明風細見一大黿出水直上山頂引首四望頃之江水中湧出一綵舟有十餘人㑹飲酒妓樂陳設甚盛獻夀久之上流有巨艦來下㯭聲振於坐中綵舟乃没前之黿亦下未幾死於岸側意者鬼神使此黿為候望而不知巨艦之來故殛之閻居敬新安人閻居敬所居為山水所侵恐後壞榻移於户外而寢夢一烏衣人曰君避水在此我亦避水至此於君何害而迫逐我如是不快甚矣居敬寤不測其故爾夕三夢居敬曰豈吾不當止此邪因命移牀脚壓一龜於户限外放之而去池州民池州民楊氏以賣鮓為業嘗烹鯉魚十枚令兒守之將熟忽聞釜中乞命者數四兒驚懼走告其親往視之釜中無復一魚求之不得朞年所蓄犬恒窺户限下而吠數日其家人曰去年鯉魚得非在此邪即撤視之得龜十頭送之水中家亦無恙李宗李宗為楚州刺史郡中有尼方行於市忽踞地而坐不可推動不食不語者累日有司以告宗命武士扶起掘其地得大龜長數尺送之江中其尼乃愈漁人𤓰村有漁人妻得勞瘦疾轉相傳染死者數人或云取病者生釘棺中棄之其病可絶頃之其女病即生釘棺中流之於江至金山有漁人見而異之引之至岸開視之見女子猶活因取置漁舍中多得鰻鯬魚以食之久之病愈遂為漁人之妻至今尚無恙陳寨陳寨者泉州晉江巫也善禁呪之術為人活疾多效者澶州逆旅蘓猛其子病狂人莫能療乃往請陳陳至蘓氏子見之㦸手大罵寨審視曰此疾入心乃於堂中戒人無得竊視至夜乃取蘇氏子劈為兩片懸堂之東壁其心懸北簷下寨方在堂中作法所懸之心宛轉於地遂為犬食寨求之不得驚懼乃持刀出門而去主人弗知謂其作法耳食頃乃持心而入内於病者之腹被髮連叱其腹遂合蘓氏子既寤但連呼逓舖逓舖家人莫之測乃其日去十里有驛吏手持官文書死於道傍初南中驛路二十里立一逓舖吏持符牒以次傳授欲近前舖輒連呼以警之乃寨取驛吏之心而活蘓氏蘓遂愈如故稽神録卷三
