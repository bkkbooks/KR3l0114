body:
  text: 稽神録卷五宋徐鉉撰桂從義池陽建徳縣吏桂從義家人入山伐木常於所行山路有一石崩倒就視之有一室内有金漆柏牀六張茭薦芒簟皆新金銀積疊其人坐牀上良乆因揭簟下見一角柄小刀取内懐中而出恐崩石塞之以物為記歸呼家人共取及至則石壁如故了無所覩金精山木鶴處州處化縣金精山昔長沙王吳芮時女張麗英飛升之所道館在焉巖髙數百尺有二木鶴二女仙乘之鐵鏁懸於巖下非路道所至不知其所從其二鶴嘴隨四時而轉初不差焉順義道中百勝軍小將陳師粲者能卷簟為井躍而出入嘗與郷里女子遇於巖下求娶焉女子曰君能射中此鶴姻即成師粲一發而中臂即無力歸而病卧如夢夢見二女道士繞林而行舞過輒以手拂師粲之目數四而去竟致失眀而卒所射之鶴自爾不復轉其一猶轉如故辛酉歳其女子猶在師粲之子孫至今猶為軍士廣陵人賣餅有賣餅王老無妻獨與一女居王老晝日自賣餅所歸家見其女與他少年共寢於北户下王老怒持刀逐之少年躍走得免王老怒甚遂殺其女而少年行至中路忽流血滿身吏呵問之不知所對拘之還次王老之居鄊伍方按驗其事王老見而識之遂抵其罪桃林禾稼閩王初知泉州刺史州北數十里地名桃林光啓初一夕村中地震有聲如鳴數百面鼔及明視之禾稼方茂了無一莖咸掘地求之則皆倒懸在土下其年審知克晉安盡有甌閩之地六十年至其子延義立桃林地中復有鼓聲禾已收穫稌粳在邇及明視之亦無一莖掘地求之則亦倒懸土下其年延義為左右所殺王氏遂滅王延政王延政為建州節度延平村人夜夢人告之曰與汝富旦入山求之明日入山終無所得其夕復夢如前村人曰旦已入山無所得也其人曰但求之何故不得於是明日復入向暮息大𣗳下見方丈之地極明浄試掘之得赤土如丹既無他物則負之歸以飾墻壁煥然可愛人聞者競以善價從此人皆求市延政聞之取以飾其宫室署其人以牙門之職數年建州亦敗洪州樵人洪州樵人入西山巖石之下藤蘿甚宻中有一女冠姿色絶世閉目端坐衣帔皆如新近觀之不能測或為整其冠髻即應手腐壊衆懼散去復㝷之不能得見法曹吏廬州有法曹吏嘗劾一僧曲致其死其獄上州案入其妻女在家方紉經於西牕下忽有二青衣者手執大書自厨中出厲聲謂其妻曰語爾夫何故殺僧遂出門去妻女皆驚怪流汗乆之乃走出視其門扃閉固如舊吏歸具言之吏甚恐明日將竊取其案已不及矣竟殺其僧死之日即遇諸塗百計禳謝月餘竟死劉存劉存為舒州刺史辟儒生霍某為團練判官甚可信任後為左右所譛因其罪下獄白使府請殺之吳帥知其寃使執送揚都存遂縊之於獄既而存遷鄂州節度使霍友人在舒州夢霍素服自司命祠中出撫掌大笑曰吾罪得雪矣俄而存帥師征湖南霍表兄馬鄴為黄州刺史有夜扣齊安城門者曰舒州霍判官將徃軍前馬病與使君借馬守陴以告鄴歎曰劉公枉殺霍生今此人徃矣寧無禍乎因畫馬數匹焚之以祭數日存敗績死之袁州録事袁州録事參軍王某嘗以一盜獄具而遇赦王以盜罪明不可恕乃先殺之而宣赦罷歸至新喻邑邑客馬氏具巵酒請王明日當徃晚止僧院乃見盜者曰我罪誠合死然已赦矣君何敢逆王命而殺我我今得請所司矣君明日徃馬家耶不徃亦可言訖乃沒院僧但見其與人言而不見其他明日方飲暴卒劉璠軍將劉璠性強直勇敢坐法徙海陵郡守禇仁規嫌之誣其謀叛詔殺於海陵市璠將死謂監刑者曰與我白諸妻兒多置紙筆於棺中予將訟之後數年仁規入朝泊舟濟灘口夜半聞岸上連呼禇仁規爾知當死否舟人驚起視岸上無人仁規謂左右曰爾識此聲否即劉璠也命以酒食祭之仁規至都以殘虐下獄吏夜夢一人長大黥面後從二十餘人至獄執仁規而去既寤為仁規説其人乃撫膺嘆曰吾今必死此人即劉璠也其日中使至遂縊於獄中矣吴景浙西軍校吳景者辛酉歳設齋於石頭城僧院其夕既陳設忽聞婦女哭聲甚哀初逺漸近俄在齋筵中矣景乃告院僧曰景頃歳從軍克豫章獲一婦人殊有姿色未㡬其夫求贖將軍令嚴肅不可相容景即殺之後甚以為恨今之設齋正為是也即與僧俱徃乃見婦人在焉僧為之祈告婦人曰我從吳景索命不知其他遽前逐之景急走上佛殿大呼曰我還爾命於是顛仆而卒周寳周寳為浙西節度使治城隍至鶴林門得古塚棺櫝將腐發之有一女子面如生鉛粉衣服皆不敗掌墓者以告寳親視之或曰此當是嘗餌靈藥待時而發發則解化之期矣寳即命改𦵏之具輀車聲樂以送寳與僚屬登城望之行數里有紫雲覆輀車之上衆咸見一女子出自車中坐於紫雲之上冉冉乆之乃沒開棺則空矣陳師豫章逆旅梅氏頗濟惠行旅僧道投止皆不求直恒有一道士衣服藍縷來止其家梅厚待之一日謂梅曰吾明日當設齊從君求新瓷碗二十事及匕筋君亦宜來㑹可於天寳洞前訪陳師也梅許之道士持碗渡江而去梅翌日詣洞前問其村人莫知其處乆之將囘偶得一小徑甚明静試㝷之果得一院有青衣童應門問之乃陳之居也既入見道士衣冠華潔延與之坐命具食頃之食至乃熟蒸一嬰兒梅懼不食良乆又進食乃蒸一犬子梅亦不食道士嘆息命取昨所得碗贈客視之乃金碗也謂梅曰子善人也雖然不得仙千歳人參枸杞皆不肯食乃分也謝而遣之曰此而後不可復繼見矣陳金陳金者少為軍士𨽻江西節度使劉信圍處州金私與其徒五人發一大塚開棺見白髯老人面如生通身白羅衣衣皆如新開棺時即有白氣衝天墓中有非常香馥金獨視棺葢上有物如粉微作硫黄氣金素聞棺中硫黄為藥成仙即以衣􅁭掬取懐歸墓中無他珍寳即共掩之而出既至營中營中人皆驚云今日那得香氣全如硫黄之異旦輒汲水浸食至盡城平入舎僧寺偶與寺僧言之僧曰此城中富人之逺祖也子孫相傳其祖好道有異人教餌硫黄云數盡當死死後三百年墓開當即解化之期也今正三百年矣即相與復視之棺中空惟衣裳尚存如蟬脱之狀金自是無病今為清海軍小將年七十餘矣形體枯瘦輕健如故沈彬吳興沈彬少而好道及致仕歸髙安恒以焚修服餌為事嘗逰都下洞觀忽聞空中樂聲仰視雲表見仙女數十冉冉而下徃之觀中徧至像前焚香良乆乃去彬匿室中不敢出既去入殿視之几案上皆有遺香彬悉取置鑪中已而自悔曰吾平生好道今見神仙而不能禮謁得仙香而不能食之是其無分歟初彬恒誡其子云吾所居堂中正是吉地死即葬之及卒如其言掘地得自然磚壙製造甚精磚上皆作吳興字彬年八十餘卒其後豫章有漁人投生米於潭中捕魚不覺行逺忽入一石門煥然明朗行數百歩見一白髯翁諦視之頗𩔖彬謂漁人曰此非爾所宜來速出猶可漁人遽出登㟁云入水已三日矣故老有知者云此即西山天寳洞之南門也梅真君汝隂人崔景唐家甚冨嘗有道士自言姓梅來訪崔崔客之數月景唐市得玉案將之夀春以獻節度使髙審思謂梅曰先生但居此吾將詣夀春旬月而還使爾姪軰奉事無所疑也梅曰吾乃夀春人也將訪一親知己將還矣君其先往也乆居於此思有以奉報君家有水銀乎曰有即以十兩奉之梅乃置鼎中以火鍊之少乆即成白銀矣因以與景唐曰以此為路糧君至夀春可於城東訪吾家也即與景唐分路而去景唐至夀春即詣城東訪梅氏數日不得村人皆曰此中無梅家亦無為道士者惟淮南岳廟中有梅真君像得非此耶如其言訪之果梅真君矣自後竟不復遇康氏偽吳楊行宻初定揚州逺方居人稀少煙火不接有康氏者以傭貸為業僦一室於太平坊空宅中康晨出未返其夕妻生一子方蓆藁忽有一異人赤面朱衣冠據門而坐妻驚怖乆之乃走如舎西訇然有聲康適歸欲至家而路左忽有錢五千羊半羫樽酒在焉伺之乆無行人因持之歸妻亦告其所見即徃舎西㝷之乃一金人仆於草間亦曳之歸因烹羊飲酒得以周給自是出入獲富日以利贍而金人畱為家寳所生子名曰平平及長遂為富人有李潯者為江都令行縣至新寜郷見大家即平平家也其父老為李言如此豫章人天復中豫章有人治舎掘地得一木櫃得金人十二軀各長數寸皆古衣冠首戴十二辰屬鐫刻精妙殆非人功其家寳祠之因擕到金福時兵革未定遂為戍將刼之後不知所終陳濬江南陳濬尚書自言其諸父在郷里好為詩里人謂之陳白舎人此之樂天也性踈簡喜賓客嘗有二道士一黄衣一白衣詣其家求舎舎之㕔事夜分聞二客牀壊訇然有聲乆之若無人者秉燭視之見白衣人卧於壁乃銀人也黄衣人不復見矣自是豐富建安村人建安有人村居者常使一小奴入城市經過舎南大塚塚旁恒有一黄衣人與之較力為戱其主因歸遲將責之奴以實告徃覘之信然一日挟撾而徃伏於草間小奴至黄衣兒復出即起擊之應手而仆乃金兒也因持而歸家遂殷富蔡彦卿廬州軍吏蔡彦卿為拓皋鎮將暑夜坐鎮門外納涼忽見道南桑林中有白衣婦人獨舞就視即滅明夜彦卿扶杖先徃伏於草間乆之婦人復出而舞即擊之墜地乃白金一餅復掘地獲銀數千両遂致富裕云岑氏臨州人岑氏嘗逰山溪水中見二白石大如蓮實自相馳逐捕而獲之歸置巾箱中其夕夢二白衣美女自言姊妹來侍左右既寤益知二石之異也恒結於衣帶中後至豫章有波斯國人邀而問之君有寳耶曰然即出二石示之胡人欲以三萬為價得之岑雖寳藏而實無用得錢甚喜因以與之胡謝而去岑氏因此而贍但恨不能問其名與所用云建州村人建安有村人乗小舟徃來建溪中賣薪為業嘗泊舟登岸將伐薪忽見山上有數百錢流下稍上之累獲數十未及小半有大𣗳下一甕髙五六尺錢滿其中而甕小欹故錢流出於是推而正之以石支之納衣襟得五百而歸盡率其家人復徃盡取既至得舊路見大𣗳而亡其甕村人徘徊數日不能去夜夢人告之曰此錢有主向為甕欹以五百僱而正之不可再得也徐仲寳徐仲寳者長沙人所居道南有大枯𣗳合抱無數有僕夫灑掃其下沙中獲錢百餘以告仲寳仲寳自徃亦獲數百自爾每需錢即徃掃其下必有所得如是積年凡得數十萬仲寳後至揚都選授舒城令暇日與妻共坐地中忽有白氣甚動烈斜飛向外而去中若有物其妻以手攫之得一玉蛺蝶製作精妙人莫能測後為樂平令家人復於厠厨鼠穴中得錢甚多仲寳即率人掘之深數尺有一白雀飛出止於庭𣗳其下獲錢至百萬錢盡白雀乃去不知所之邢氏建業有庫子姓邢家貧聚錢滿二千輒病或失去其妻竊聚錢埋於地中一日忽聞有聲如蟲飛自地出穿忩户而去有觸墻壁堕地者明旦視之皆錢也其妻乃告邢使埋瘞之再視則皆亡矣邢得一自然石龜其狀如真置庭中石榴𣗳下或見之曰此寳物也因裝置巾箱中自爾稍稍充足後頗富饒矣林氏汀州有林氏其先嘗為郡守罷任家居一日天忽雨錢充積其家林氏乃整衣冠仰天而祝曰非常之事必將為禍於此速止林氏之福也應聲而止所収已鉅萬至今為富人云曹真夀春人曹真出行野外忽見坡下有數千錢自逺而來飛聲如鈴真逐之入一小穴以手掬之可得數十而已又舒州桐城縣雙港戍有因風卷錢經市而過市人隨攫其錢以衣襟貯之風入石城荆􅁄中人不能入而止所得錢歸家視之與常錢無異而皆言亡八九矣破木有肉建康有木工破木木中有肉五斤許其香如熟猪肉此又不可以理窮究者矣登第皂荚泉州文宣王廟庭宇嚴峻學校之盛于藩府庭中有皂荚𣗳每州人將登第即生一荚以為常矣梁貞明中忽然生二荚有半人莫諭其意乃其年州人陳逖進士及第黄仁𨽻學究及第仁𨽻恥之復應進士舉至同光中舊生半莢之後復生全荚其年仁𨽻及第後數年廟為火焚其年自稱尊號不復生莢遂至今矣張懐武南平王鍾傅鎮江西遣道士沈太虚禱廬山九天使者太虛醮罷夜坐廊廡間忽然若夢見壁畫一人前揖太虛曰身張懐武也嘗為軍將上帝以微有隂功及物今配此廟為靈官既寤起視壁畫署曰五百靈官太虛歸以語進士沈彬彬後二十年逰醴陵縣令陸生客之方食有軍吏許生後至語及張懐武彬因問之許曰懐武者蔡之裨將某之長吏也頃甲辰年大饑聞豫章獨稔即與一他將各率其屬奔豫章既即路兩軍稍不相能比至武昌釁隙大作尅日將决戰禁之不可懐武乃擕劍上戍樓雲梯謂其徒曰吾與汝今日之行非有他圖直救性命耳奈何不忍小忿而相攻戰夫戰必強者傷而弱者亡如是則何為去父母之邦而死於道路耶凡兩軍所以致争者以有懐武故也今為汝等死兩軍為一無徒召難矣遂自刎於是兩軍之士皆伏樓下慟哭遂相與和親比及豫章無人逃亡者許但懐其舊恩亦不知靈官之事彬因述記以申明之豈天意將感發死義之士故以肹蠁告人乎稽神録卷五
