body:
  text: 稽神録巻二宋徐鉉撰紫石晉安有東山樵人陳某常見山中有紫光燭天伺之久乃見一大鹿光自口中設罝捕而獲之刳其腹得一紫石圓瑩如珠因寳藏之家自是富至其孫奢縱好酒醉而翫其珠以為石何能神因撃碎之家自是貧矣楊邁司農卿楊邁少好畋獵自云在長安時放鷹於野遙見草際一􅇠跳躍鷹亦自見即奮徃搏之既至無有收鷹上鞲行數十歩㢠廻顧其處復見其􅇠又搏之亦不獲如是者三即命大芟草以求之得􅇠骨一具葢􅇠之鬼也舒州人舒州有人入灊山見大蛇擊殺之視之有足甚以為異因負而出將以示人遇縣吏數人於路因告之曰我殺此蛇而有四足吏皆不見曰蛇何在曰在爾前何故不見即棄蛇於地乃見之於是負此蛇者皆不見人以為恠乃棄之按此蛇生不能自𨼆其形死乃能𨼆人之形此理有不可窮者賈潭偽吳兵部尚書賈潭言其所知為嶺南節度獲一橘其大如升將表獻之監軍中使以為非常物不可輕進因耴鍼㣲刺其蔕下乃有蠕蠕而動者因破之中有一小赤蛇長數寸姚景偽吳夀州節度使姚景為兒時事濠州節度使劉金給使廏中金嘗猝行至内見景方寢有二小赤蛇戱於景面出入兩鼻中良久景寤蛇乃不見金由是驟加寵擢妻之以女卒至大官王稔偽吳夀州節度使王稔罷歸揚都為統軍坐㕔事與客語忽有小赤蛇自屋墜地向稔而蟠稔令以器覆之良久發視惟一蝙蝠飛去其年稔陞平章事安陸人安陸人姓毛善食毒蛇以酒吞之嘗逰齊魯遂至豫章恒弄蛇於市以乞丐為生積年十餘有賣薪者自鄱陽来宿黄培山下夢老父云為我寄一蛇與江西弄蛇毛生也乃至豫章觀歩問賣薪將盡有一蛇蒼白色蟠於船舷觸之不動賣薪者方省向暮即擕蛇至市訪得毛生因以與之毛始欲展撥應手嚙其指毛失聲顛仆遂卒良久即腐壊蛇亦不知所在食虎建安山中人種粟者皆搆棚於髙𣗳以防虎嘗有一人方升棚見一虎垂頭塌尾過去甚速俄有一獸如虎而稍小躡前虎而去遂聞竹林哮吼震地久之乃寂明日徃視其虎被食畧盡但存少骨鞭牛京中居人晚出見江上石公山下有二青牛腹青背赤戱於水濱一白衣老翁長可三丈執鞭於其傍久之翁回顧見人即鞭二牛入水翁即跳躍而上倐然漸長一舉足徑上石公山頂遂不復見王姥廣陵有王姥病數日忽謂其子曰我死必生某西溪浩氏為牛子當贖之而我腹有王字是也頃之遂卒其西溪者海陵之西地名也其民浩氏生牛腹有白毛成王字其子尋而得之以束帛贖之以歸陳璋淮南統軍陳璋加平章事拜命於朝李昇時執政謂璋曰吾將詣公賀且求一女婿於公家公其先歸吾將至璋馳一赤􅂹而去中路馬蹶而墜頃之昇至璋扶疾而出昇坐少選即去璋召馬數之曰吾以今日拜官又議親事爾乃以是而墜我畜生不忍殺汝使牽去勿與芻秣餓死之是夜圉人竊秣之馬視之而已達旦不食芻如是累日圉人以告璋復召數之曰爾既知罪吾赦爾馬跳躍而去是夕乃飲食如故璋後出鎮宣城罷歸而卒旬日之中馬亦悲鳴而死吳宗嗣軍使吳宗嗣者嘗有某府吏從之貸錢二十萬月計利息一年後不復肯還求索不可得宗嗣怒召而責之曰我前世負爾錢我今還矣爾負我當作驢馬還我因焚劵而遣之逾年宗嗣獨坐㕔事忽見吏白衣而入曰某来還債宗嗣曰已焚劵何用復償吏不答徑入廏中俄而廐人報馬生白駒使詣吏舎詰之死已翌日矣駒長賣之正得所負錢數孫漢威江南神武軍使孫漢威廏中有馬遇夜輒尾上放光狀若散火羣馬嘶驚漢威以為妖㧞劍斬之數月除盧州刺史唐道襲王建稱尊於蜀其嬖臣唐道襲為樞宻使夏日在家㑹大雨其所蓄猫戱水於簷溜下道襲視之稍稍而長俄而前足及簷忽雷雹大至化為龍而去鬻醯者建康有鬻醯者某蓄一猫甚俊健愛之甚辛亥嵗六月猫死某不忍棄猶置坐側數日腐且臭不得已擕棄秦淮中既入水猫乃活某下救之遂溺死而猫登岸走金烏舗吏獲之綆而鐍之舗中鏁其户出白官司將以其猫為証既還則已斷索嚙壁而去竟不復見建康人建康人方食魚棄魚頭於地俄而壁下地穴中有人乘馬鎧甲分明人不盈尺手執長槊徑刺魚頭馳入穴去如是數四即掘地求之見數大鼠魚頭在焉惟有筯一隻了不見甲馬之狀無何其人卒盧嵩太廟齋郎盧嵩所居釜鳴竈下有鼠如人哭聲因祀竈竈下有五大鼠各如方色盡食所祀之物復入竈中其年嵩選𥙷興化尉竟無怪柴再用龍武統軍柴再用嘗在㕔事凭几獨坐忽有鼠走至庭下向再用拱立如欲拜揖狀再用怒呼左右左右皆不至即自起逐之鼠乃去而㕔屋梁折所坐牀几盡壓糜碎再用後為盧鄂宣三鎮節度使卒蘇長史蘇長史者將卜居京口此宅素㓙妻子諫止之蘇曰爾惡此宅吾必獨住始宿一夕有三十餘人皆長尺餘道士冠衣褐衣来謁蘇曰此吾等所居也君必速去不然禍及蘇怒持杖逐之皆走入宅後竹林中而沒即掘其處獲白鼠三十餘頭皆殺之宅不復㓙矣盧樞侍御史盧樞言其昔為建州刺史嘗暑夜獨居寢室望月於中庭既出户忽聞堂西階下若有人語笑聲躡足窺之見七八白衣人長不盈尺男女雜坐飲酒几席什器皆具而㣲獻酬久之席中一人曰今夕甚樂但白老將至奈何因嘆叱須臾坐中皆突入隂溝中遂不見後數日罷郡新政家有猫名白老既至白老自堂西階地獲䑕七八皆殺之豫章中官天福甲子嵗豫章居人近市者夜恒聞街中若數十人語聲向市而去就則無人如是累夜人皆惴恐夜不能寐頃之詔盡誅閹官豫章所殺凡五十餘驅之向市聚語諠豗如前所聞青州客朱梁時青州有賈客泛海遇風漂至一處逺望有山川城郭海師曰自頃遭風者未嘗至此吾聞鬼國在是得非此􅁘頃之舟至岸因登之向城而去其廬舎田畆皆如中國見人皆揖之而人皆不應已而至城有守門者揖之亦不應入城宫室人物皆殷富遂至其王宫正值大宴羣臣侍宴者數十人其衣冠器用絲竹陳設之𩔖多如中國客因升殿俯偪王座以窺之俄而王疾左右扶還亟召巫者視之巫云有陽地使人至此陽氣逼人故王病其人偶来爾無心為祟以飲食車馬謝遣之可也即具酒食設座於别室王及其羣臣來祀祝客據其案而食俄有僕馭馬而至客亦乘馬而歸至岸登舟國人竟不見復遇便風得歸時賀徳儉為青州節度使與魏博節度使楊思厚有親因遣此客使魏具為思厚言之魏人范宣古親聞其事至為余言周元樞周元樞者睢陽人為平盧掌書記居臨淄官舎一夕將寢忽有車馬輜重甚衆扣門吏報曰李司空候謁元樞念親知軰皆無此人因自思必郷曲之舊吾不及知矣即出見之延坐請問其所從來曰吾新移居於此未有所止求君此宅可矣元樞驚曰何至是對曰此吾之舊宅也元樞曰吾從官至此相傳云書記之公署也君何時居此曰隋開皇中嘗居之元樞曰若爾君定是鬼􅁘曰然地府許我立廟於此故請君移去爾元樞不可曰人不當與鬼相接豈吾將死故君得臨吾􅁘雖然理不當以此宅授君吾雖死必與君訟因召妻子曰我死必多置紙筆於棺中將與李君對訟即具酒與之飲相酬數百言詞色愈厲客將去復留之良久一蒼頭来云司空周書記本正直人也安可與之論難自取困殆客於是辭謝而去送之出門倐忽不見元樞竟無恙朱延夀夀州刺史朱延夀末年浴於室中窺見窗外有二人皆青靣朱髮青衣手執文書一人曰我受命来取一人曰我亦受命来取一人又曰我受命在先延夀因呼侍者二人即㓕侍者至問外有何人皆云無人俄而􅀍殺秦進忠天祐丙子嵗浙西軍士周交作亂殺大將秦進忠張𦙍凡十餘人進忠少時嘗怒一小奴刃貫心殺而并埋之末年恒見此奴捧心而立始見百歩之外稍稍而近其日將出乃在馬前左右皆見之入府遇亂兵傷胸而卒張𦙍前月餘每聞呼其姓名者聲甚清越亦稍稍而近其日若在對靣入府而斃望江李令望江李令者罷秩居舒州有三子能聰慧令嘗飲酒暮歸去家數百歩見二子来迎即共擒而毆之令驚怒大呼而逺方人竟絶無知者且行且毆將至家二子皆却走而去及入門二子復迎於堂下問之皆云未嘗出門後月餘令復飲酒於所親家因具白其事請留宿不敢歸而其子恐父暮歸復為所毆即俱徃迎之及至中途見其父怒曰何故暮出即使從人擊之因而獲免明日令歸益駭其事不數月父子皆卒郡人云吾舒有山鬼善為此厲葢黎丘之徒也建康樂人建康有樂人日晩如市見二僕夫云陸判官召隨之而去至一大宅陳設甚嚴賔客十餘人皆善酒諱飲酒而説食酒亦不及二人向曙而散樂人困甚因卧門外牀上及寤乃在草間旁有大塜問其里人云相傳陸判官之塜不知何時人也黄廷讓建康吏黄廷讓嘗飲酒於親家迨夜而散不甚醉而恍然身浮飄飄而行不能自制可十數里至一大宅寂然無人堂前有小房房中有牀廷讓困甚因寢牀上及寤乃在蔣山前草間踰重城􅃨塹矣因恍忽得疾嵗餘乃愈張瑗江南内臣張瑗日暮過建康新橋忽見一美婦人袒衣猖獗而走瑗甚訝諦視之婦人忽爾囘顧化為旋風撲瑗瑗馬倒傷靣月餘乃復初馬既起乃提一足跛行而歸自是每過此橋輙提一足而行竟亦無他怪禍婺源軍人妻丁酉嵗婺源建威軍人妻死更娶其後妻虐遇前妻之子夫不能制一日忽見亡妻自門而入大怒後妻曰人誰無死孰無母子之情乃虐我兒女如是􅁘吾比訴於地下所司今與我假十日使我誨汝汝遂不改必能殺君矣夫妻皆恐懼再拜即為具酒食遍召親黨隣里問訊叙語如常他人但聞其聲惟夫妻見之及夜為設榻别室夫欲從之宿不可滿十日將去復責詈其後妻言甚切至舉家親族共送至墓百餘歩曰諸人可止矣復慇懃辭别而去將及栢林中遂入人皆見之衣服容色如平生及墓而沒建威軍使汪延昌言如是陳徳遇辛亥嵗江南偽右藏庫官陳居讓字徳遇直宿庫中其妻在家五更初忽夢二吏手把文書自門而入問此陳徳遇家􅁘曰然徳遇何在曰在庫中吏將去妻追呼之曰家夫字徳遇耳有主衣庫官陳徳遇者家近在東西曲二吏相視而嘻曰幾誤遂去彌日徳遇晨起如厠乃自云有疾還卧良久遂卒二人並居冶城之西廣陵吏人廣陵吏姓趙當暑獨寢一室中夜忽見大黄衣人自門而入從小黄衣七八謂已曰處處尋不得乃在此􅁘叱起之曰可以行矣一黄衣前白曰天年未盡未可遽行宜有以記之可也大人即探懐出印印其左臂而去及眀視之印文著肉字若古識其下右若先字左若記字其上不可識趙不知所終田達誠廬陵有賈人田達誠富於財業頗以周給為務治第新成有夜叩門者就視無人如是再三因呵問之為人􅁘鬼􅁘良久答曰實非人也比居龍泉舎為暴水所漂求寄君家治舎畢乃去耳達誠不許曰人豈可與鬼同居􅁘對曰暫寄居耳無害於君且以君義氣聞於郷里故告耳達誠許之因曰當止我何所達誠曰惟有㕔事耳即辭謝去數日復来曰吾家已至㕔中亦無妨君賔客然亦嚴整家人謹慎火燭萬一不虞或當云吾等所為也達誠亦虛其㕔以付之達誠嘗為詩鬼忽空中言曰君乃能詩􅁘吾亦嘗好之可唱和耳達誠即具酒置紙筆於前談論無所不至衆目視之酒與紙筆儼然動試暫㢠廻顧則酒已盡字已著紙矣前後數十篇皆有意􅃐筆迹勁健作桞體或問其姓字曰吾倘言之將不益於主人可詩以寄言也乃賦詩云天然與我亦靈通還與人間事不同要識吾家真姓字大字南頭一段紅衆不喻也一日復告曰吾有少子婚樟𣗳神女以某日成禮復欲借君後堂三日以終君大惠可乎達誠亦虛其堂以幕帷之三日復謝曰吾事訖矣還君此堂主人之恩可謂至矣然君家老婢某可笞一百也達誠辭謝即召婢笞數下鬼曰使之知過可止矣達誠徐問其婢云曽穴幕竊視見賔客男女厨膳花燭與人間不殊後嵗餘乃辭謝去達誠以事至廣陵久之不歸其家憂之鬼復至曰君家憂主人􅁘吾將省之翌日乃還曰主政在揚州甚無恙行當歸矣新納一妾與之同寢吾燒其帳後幅以戱之耳大笑而去達誠歸問其事皆同後至龍泉訪其居亦竟不獲稽神録卷二
