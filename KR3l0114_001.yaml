body:
  text: 稽神録卷一宋徐鉉撰朱拯偽吳玉山主簿朱拯赴選至揚都夢入官署堂上一紫衣正坐傍一綠衣紫衣起揖拯曰君當以十千錢見與拯拜許諾遂寤頃𥙷安福令既至謁城隍神廟宇神像皆如夢中其神座後屋漏梁壊拯嘆曰十千豈非此耶即以私財葺之費如其數韋建江南戎帥韋建自充軍除武昌節度使將行夢一朱衣人𨗳從數十來詣韋曰聞君將鎮鄂渚僕所居在焉棟宇頽毁風雨不蔽非公不能為僕修完也韋許諾及至鎮訪之乃宋無忌廟視其像即夢中所見因新其廟祠祀數有靈騐云鄭就夀春屠者鄭就家至貧嘗夢一人自稱廉頗謂就曰可於里東掘地取吾寳劒當令汝富然不得改舊業就如其言果獲之踰年遂富後洩其事於是失劍董昌董昌未遇前有山隂縣老人為上言於昌曰今大王善政及人願萬嵗帝於越以福兆庶三十年前已有謠言正合今日故來獻其言曰欲識聖人姓千里草青青欲知聖人名日從曰上生昌得之大喜因誇曰天命早已歸我我為天子矣乃贈老人百縑仍免其征賦先遣道士朱思逺立壇醮上帝忽一夕云天符降於函中有碧紙朱書其文人不可識思逺言天命合興董氏又有王守貞者俗謂之王百藝極機巧初立生祠雕刻形像塑繪宫嬪及設兵衛狀若鬼神皆百藝所為也妖偽之際尤興百藝幻惑之術昌每言我聞兎子上金牀䜟我也我卯生來嵗屬卯二月二日亦卯即卯年卯月卯日仍當以卯時萬世之業利在於此乾寧二年二月二日率軍俗數萬人僣衮冤儀衛登子城門樓赦境内改偽號羅平國年號天冊自稱聖人及令官屬將校等皆呼聖人萬嵗俯而言曰云云畢復欲舞蹈昌乃連聲止之曰卿道得這許多言語壓得朕頭疼無奈何也葢縁工人所製平天冠稍重故有是言也時人聞者皆大笑之熊博熊博者本建安津吏岸崩出一古塜藤蔓纏其棺傍有石銘云欲陷不陷被藤縛欲落不落被沙擱五百年後遇熊博博使平光寺僧為率錢葬之博後至建州刺史彭城佛寺國初楊汀自言天祐初在彭城避暑於佛寺雨雹方甚忽聞大聲震地走視門下乃下一大雹於街中其髙廣與寺樓等入地可丈餘頃之雨止則炎風赫日經月雹乃消盡歐陽氏廣陵孔目吏歐陽某者居决定寺之前其家妻小遇亂失其父母至是有老父詣門使白其妻我汝父也妻見其貧陋不恱拒絶之父又言其名字及中外親族甚悉妻竟不聽又曰吾自逺來今無所歸矣若爾權寄門下信宿可乎妻又不從其夫勸又不可父乃曰去吾將訟爾矣左右以為何訟耳亦不介意眀日午暴風雨從南方來有震霆入歐陽氏之居牽其妻至中庭擊殺之大水平地數尺隣里皆漂蕩不自持後數日歐陽之人至土廟神座前得一書即老父訟女文也廬山賣油者廬山下賣油者養其母甚孝謹為暴雷震死其母自以無罪日號泣於九天使者之祠願知其故一夕夢緋衣人告曰汝子恆以魚膏雜油中以圖厚利且廟中齋醮常用其油腥氣薰蒸靈仙不降其震死宜矣母知其事遂止李誠江南軍使蘇建雄有别墅在毗陵常使傔人李誠來徃撿事乙卯嵗六月誠自墅中回至句容縣西時盛暑赫日持傘自覆忽起大風飛沙㧞木捲其傘葢而去惟持傘柄行數十歩雷雨大至方憂濡濕忽有飄席至其所因取覆之俄而雷震地道傍數家之中捲去一家屋室向東北而去頃之震其居蕩然無復遺者老幼十餘皆聚桑林中一無所傷舎前有足跡長三尺誠又西行數里遇一人求買所覆席即與之復里餘又遇一人求買所持傘柄誠乃異之曰此物無用爾何為者乃欲買之其人但求乞甚切終不言其故隨行數百歩與之乃去茅山牛庚寅嵗有茅山村中兒牧牛洗所著汗衫曝於草上而假寐及覺失之惟一隣兒在傍以為竊去因相諠競隣兒父見之怒曰生兒為盜將安用汝即投水中隣兒匍匐出水呼天稱寃者不已復欲投之俄而雷雨暴至震死其牛汗衫乃自牛口中嘔出兒乃得免番禺村女庚申嵗番禺村女有老姥與之餉田忽雲雨晦㝠及霽反失其女姥號哭乃求訪諸隣里相與尋之不能得後月餘復雲雨晝晦及霽而庭中陳列筵席有鹿脯乾魚果實酒醢甚豐腆其女盛服至而姥驚喜持之女自言為雷師所娶將至一石室中親族甚衆婚姻之禮一同人間今使歸返而他日不可再歸矣姥問雷郎可得見耶曰不可得留數宿一夕復風雨晦冥遂不可見矣江西村嫗江西村中雷震一老嫗為電火所燒一臂盡傷既而空中有呼曰誤矣即墜一瓶瓶有葉如膏曰以此傅之即瘥嫗如其言隨傅而愈家人共議此神丹也將取藏之數人共舉其瓶不能動頃之復有雷雨攝之而去又有一村人亦震死空中人呼曰誤矣可急取蚯蚓搗爛傅臍中當瘥如言傅之乃蘇甘露寺道士范可保夏月獨逰浙西甘露寺出殿後門將登北軒忽有人衣故褐衣自其傍入肩帔相拂范素好潔新衣恐汚心不恱俄而牽一黄犬又摩肩而出范怒形於色褐衣人回顧張目其光如電范始畏懼頃之山下人至曰向者山上霹靂取龍子聞之乎范固不知也南康縣令辛酉五月四日有使過南康縣令胡侃置酒於縣南蓮花館水軒忽有暴雨吹沙從南来用手掩目聞盤中器物蔌蔌有聲若物飛過良久開目見食器微反其銀酒盃與盃之舟皆狹長時東西影壁傍有大桐𣗳亦㧞出投於一里外皆此風雨常遙聞館中迅雷而館中初不聞也胡亦無恙犬吠石婺源縣有大黄石自山墜於溪側瑩徹可愛羣犬見而競吠之數日村人不堪其諠乃相與推致水中犬又俯水而吠愈急取而碎之犬乃不吠甕形石潘祚為鄱陽令縣治後連帶石城其中隙荒數十畆祚嘗還家望月於此見城下草中有光髙數丈其間荆棘䝉宻不可夜行即取弓射其處以志之明日掘其地得一甕大腹小口青石塞之祚命舁之歸家發其口不可開令擊碎之乃一石如甕之形乃氷凍之凝結者復碎而棄之於中訖無所得金蠶右千牛撫曹王文秉丹陽人世善刻石其祖嘗為浙西廉使裴璩采碑於積石之下得一自然圓石如毬形試加礱斵乃重叠如殻相包斵之至盡其大如拳破視之中有一蠶如蠐螬蠕蠕能動人不能識因棄之數年浙西亂王出奔至蜀下與鄉人夜㑹話語及浙西送還錢事坐中或云人欲求富莫如得石中金蠶蓄之則寳貨自至矣問其形狀則石中蠐螬也濠州井戊子嵗大旱濠州酒肆前有大井堙塞積久至是酒家召井工陶井其工人父子應募者乃子先入倚繩而死其父繼下亦卒觀者如堵無敢復入引繩出屍竟不復鑿雞井江夏有林主簿虐而好賭甚愛一女好食雞里胥日供雙雞一日將殺雞雞走其女自逐之雞入舎北枯井中女亦入井遂不見林自徃亦入井不出俄井中黒氣騰上如炊其家但臨井而哭無敢入者有屠兒請入視之但見大釜湯涌火熾有人拒其足曰事不干汝不得入而出久之氣稍稍而熄井中惟雞骨一具人骨二具此事數聞故老言之不知其何怪也軍井建州有魏使君宅兵後焚毁以為軍營有大井堙塞壬子嵗軍士浚之入者二人皆卒屍亦不獲有一人請復入曰以繩縋我我亟引繩即出之既入久之忽掣其繩甚急即出之色如癡矣良久乃能言云既入井但見城郭邑廬人物甚衆其主曰李將軍機務鞅掌府署甚盛懼而欲遽出竟不獲二屍建州留侯朱斥嘗奉使鎮此井金華令王祝從子某為金華令築私第於邑中其日暴雨大至水忽奔徃東南隅如灌漏巵頃刻而盡其地成井深不可測以絲絙縋石而測之數十丈乃及底得一新饅頭而出與人間嘗食者無小異也徐善江南偽中書舎人徐善幼孤家於豫章楊吳之㓂豫章善之妹為一軍校所虜既定軍校求得善請以禮聘之善自以舊族不當與戎士為婚固不許乃强納幣焉悉擲棄之臨以白刃亦不懼然竟虜之而去善即詣揚都求見吳揚渥而訴之時渥初嗣藩服府庭甚嚴僭儗王者布衣逰士旬嵗不得一見而善始至白沙渥夜夢人来言曰江西有秀才徐善將来見公今在白沙逆旅矣其人良士也且有情事未伸公其厚遇之渥旦即遣人迎之既至禮遇甚厚問所欲言具白其妹事渥即命購贖歸於徐氏時歙州刺史陶雅聞而異之因辟為從事何致雍何致雍者賈人之子也幼而英爽好學嘗從其叔父泊舟晥口其叔夜夢一人若官吏乘馬從數僕来徃岸側徧閱舟船人物之數復一人自後呼曰何僕射在此勿驚之對曰諾不敢驚既寤徧訪隣舟之人皆無何姓者乃移舟深浦中翌日大風濤所泊之舟皆沒惟何氏存叔父乃謂致雍曰吾家世貧賤我復老矣何僕射必汝矣善自愛致雍後受知於湖南為節度判官㑹楚王殷自稱尊號以致雍為户部侍郎翰林學士致雍自謂當作相而居師表之任後楚王希範嗣立復去帝號以致雍為節度判官撿校僕射竟卒於官郭仁表偽吳春坊吏郭仁表居冶城北甲寅嵗因得疾沉痼忽夢一道士衣金花紫帔從一小童自門入坐其堂上仁表初不甚敬因問疾何時可愈道士厲色曰甚則有之既寤疾甚數夜復夢道士至因叩頭遜謝久之道士色觧索紙筆仁表以為將疏方即跪奉之道士書而授之其辭曰飄飄暴雨可思維鶴望巢門歛翅飛吾道之宗正可依萬物之先數在兹不能行此欲何為夢中不曉其義將問之童子搖手曰不可因拜謝道士自西北而去因而疾愈王璵偽吳鄂帥王璵少為小將從軍圍頴州夜夢道士告之曰旦有流星墮地能避之當至將相明日衆軍攻城城中矢石如雨璵仗劍倚栅木而督戰俄有飛石正中其栅木及璵鎧甲之半皆糜碎而璵無傷因歎曰流星正謂爾耶由是自負卒至大官謝諤進士謝諤家於南康舎前有溪常逰戱之所也諤為兒時嘗夢浴於溪中有人以珠一器遺之曰郎吞此則眀悟矣諤度其大者難吞即吞細者六十餘顆及長善為詩進士裴說為選其善者六十餘篇行於世崔萬安江南司農少卿崔萬安分務廣陵嘗病苦脾泄困甚其家人禱於后土祠是夕萬安夢一婦人珠珥珠履衣五重皆編貝玉為之謂萬安曰此病可治今以一方相與可耴青木香肉荳䓻等分棗肉為丸米飲下二十丸又云此藥太熱疾平即止如其言服之遂愈江南李令江南有李令者累任大邑假秩至評事世亂年老無復宦情築室於廣陵法雲寺之西為終焉之計嘗夢束草加首口銜一刀兩手各持一刀入水而行意甚異之俄而孫儒陷廣陵儒部將李瓊屯兵於法雲寺恒止李令家父事令及儒死宣城禆將馬殷劉建封軰率衆南走瓊因强令俱行及殷據湖南瓊為桂管觀察使用令為荔浦令則前夢之騐也毛貞輔偽吳毛貞輔累為邑宰應選之廣陵夢吞日既寤腹猶熱以問侍御史楊廷式楊曰此夢至大非君所能當若以君而言當得赤烏場官也果如其言陸洎江南陸洎為常州刺史不克之任為淮南副使性和雅重厚時軰推仰之副使李承嗣與之尤善乙丑嵗九月承嗣與諸客訪之洎從容曰某明年此月當與諸君别矣承嗣問其故答曰吾向夢一騎兵召去止大明寺西可數里至一大府署曰陽明府入門西序復由東向大門下馬入一室中久之吏引至堦下門中有二緑衣吏捧一案案上有書一紫衣秉笏取書宣云洎三世為人皆行慈孝功成業竟並受此官可陽眀府侍郎判九州都監事来年九月十七日本府上事復以騎送歸奄然遂寤靈命已定不可改矣諸客黙然至明年九月日使候其起居及十六日承嗣復與向客候之謂曰眀日君當上事今何無恙也洎曰府中已辦眀當行也承嗣曰吾嘗以長者重君今無乃近妖乎洎曰惟君與我有縁他日必當卜隣承嗣黙然而去眀日遂卒葬於茱萸灣承嗣後為楚州刺史卒𦵏於洎墓之北周廷翰江南太子校書周廷翰性好道頗修服餌之事嘗夢神人以一卷書示之若道家之經其文皆七字為句惟記其末句云紫髯之伴有丹砂廷翰寤而自喜以為必得丹砂之效後從事建業卒𦵏於吳大帝陵側無妻子惟一婢名丹砂王瞻處化縣令王瞻罷任歸建業泊舟秦淮病甚夢朱衣吏執牒至曰君命以詔奉召君瞻曰命不敢辭但舟中隘狹欲寛假之使得登岸卜居無所憚也吏許諾以五日為期曰至期平旦當来也既寤便能下牀自出僦舎營辦凶具教其子哭踊之節召六親為别登榻安卧至期向曙乃卒邢陶江南大理司直邢陶癸卯嵗夢人告云君當為涇州刺史既而為宣州涇縣令考滿復夢其人告云宣州諸縣官人来春皆替而君官誥不到邢甚惡之至明年春罷歸有薦陶為水部員外郎牒下而所司失去復請二十餘日竟未拜而卒稽神録卷一
