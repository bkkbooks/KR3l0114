body:
  text: 稽神録小說家類二異聞之屬提要臣等謹案稽神録六卷宋徐鉉撰鉉字鼎臣廣陵人仕南唐為翰林學士隨李煜歸宋官至直學士院給事中散騎常侍淳化初坐纍謫靜難軍司馬卒於官事迹具宋史本傳是編皆記神怪之事朝公武讀書志載其自序稱自乙未歲至乙卯凡二十年則始於後唐廢帝清泰二年迄於周世宗顯德二年猶未入宋時所作書中惟乾寧天復天祜開成同光書其年號自後唐明宗以後則但書甲子考馬永卿懶真子稱南唐自顯德五年用中原正朔士大夫以為恥碑文但書甲子此書猶在李璟去帝號前三年殆必原用南唐年號入宋以後追改之其稱楊行密曰僞吳稱南唐曰江南其官亦稱僞某官亦入宋以後所追改歟讀書志云所載一百五十事陳振孫書録解題云元本十卷此無卷第當是他書中録出者案今本止六卷而反有一百七十四事未又有拾遺十三事與朝氏所云卷數條數俱不合案楓窗小牘云太宗命儒臣修太平廣記時徐鉉實與編纂稽神録鉉所著也每欲采擷不敢自専輒示宋白使問李昉昉曰詎有徐率更言無稽者于是此録遂得見收疑是録全載太平廣記中後人録出成帙而三大書徴引浩博門目叢雜所列諸書凡一名叠見者太平御覽皆作又字文苑英華皆作前名字廣記皆作同上字其間前後相連以甲蒙乙者往往而是或緣此多録數十條亦未可知也讀書志又云楊太年云江東布衣蒯亮好大言夸誕鉉喜之館于門下稽神録中事多亮所言考鉉騎省集中有送蒯參軍亮詩前四句云昔年聞有蒯先生二十年來道不行抵掌曽談天經事折腰猶忤俗人情則鉉客實有蒯亮然不言及說鬼事又書中載破瘤得碁子得針二章云聞之於亮則不題亮名者似非亮語趙與峕賓退録備載洪邁夷堅志諸序稱其三志庚集序考徐鉉稽神録楊文公談苑所載蒯亮之事非是其說必有所考今不得而見之矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
